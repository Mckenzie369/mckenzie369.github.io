<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Management System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .back-btn {
            background-color: #333;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
        }
        .save-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
        .save-btn:hover {
            background-color: #45a049;
        }
        
        /* การตั้งค่าตารางให้เลื่อนซ้ายขวาได้ */
        .table-responsive {
            overflow-x: auto;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            white-space: nowrap; /* ป้องกันไม่ให้ข้อความตกบรรทัด */
        }
        
        /* ตกแต่งหัวตาราง */
        th {
            background-color: #fff200; /* สีเหลืองตามภาพ */
            color: #000;
            border: 1px solid #ccc;
            padding: 12px 8px;
            font-size: 0.9rem;
            text-align: center;
        }
        
        /* ใส่สีพื้นหลังให้บางคอลัมน์เหมือนในภาพ */
        th.col-status { background-color: #a8f0c6; } /* สีเขียวอ่อน */
        th.col-front { background-color: #b3e5fc; } /* สีฟ้าอ่อน */
        th.col-back { background-color: #ffecb3; } /* สีส้มอ่อน */
        th.col-hangdong { background-color: #e1bee7; } /* สีม่วงอ่อน */
        th.col-sum { background-color: #c8e6c9; } /* สีเขียว */
        th.col-diff { background-color: #bbdefb; } /* สีฟ้า */

        /* ตกแต่งช่องกรอกข้อมูล */
        td {
            border: 1px solid #ccc;
            padding: 0; /* เอา padding ออกเพื่อให้ input เต็มกรอบ */
        }
        
        /* ทำให้ช่อง input เนียนไปกับตารางเหมือน Excel */
        input[type="text"], input[type="number"], input[type="date"] {
            width: 100%;
            border: none;
            padding: 10px 8px;
            box-sizing: border-box;
            background-color: transparent;
            font-family: inherit;
            font-size: 0.9rem;
        }
        
        /* เมื่อคลิกที่ช่อง ให้มีกรอบสีฟ้าโผล่ขึ้นมา */
        input:focus {
            outline: 2px solid #2196F3;
            outline-offset: -2px;
            background-color: #f0f8ff;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h2>ระบบจัดการและตรวจนับสินค้า</h2>
        <div>
            <a href="index.html" class="back-btn">กลับหน้าหลัก</a>
            <button class="save-btn" onclick="alert('นี่คือปุ่มจำลองการบันทึกข้อมูลครับ')">บันทึกข้อมูล</button>
        </div>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>วันที่</th>
                    <th>รหัสสินค้า</th>
                    <th>ชื่อสินค้า</th>
                    <th class="col-status">สถานะหมดอายุ</th>
                    <th>น้ำหนัก</th>
                    <th>บรรจุ</th>
                    <th>Location</th>
                    <th>ผู้รับผิดชอบ</th>
                    <th class="col-front">หน้าร้าน</th>
                    <th class="col-back">หลังบ้าน</th>
                    <th class="col-hangdong">หางดง</th>
                    <th class="col-sum">ผลรวม (จำนวน)</th>
                    <th class="col-sum">ผลรวม (น้ำหนัก)</th>
                    <th class="col-diff">ที่มาของส่วนต่าง</th>
                    <th>หมายเหตุ</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="date" value="2026-06-18"></td>
                    <td><input type="text" value="12FC6003105E"></td>
                    <td><input type="text" value="อ.ปลาสวยงาม CPF..."></td>
                    <td><input type="text" value="ปกติ"></td>
                    <td><input type="number" step="0.1" value="1.5"></td>
                    <td><input type="number" value="1"></td>
                    <td><input type="text" value="PETSHOP"></td>
                    <td><input type="text" value="W"></td>
                    <td><input type="number" placeholder="0"></td>
                    <td><input type="number" placeholder="0"></td>
                    <td><input type="number" placeholder="0"></td>
                    <td><input type="number" readonly placeholder="คำนวณออโต้" style="background:#f0f0f0;"></td>
                    <td><input type="number" readonly placeholder="คำนวณออโต้" style="background:#f0f0f0;"></td>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                </tr>
                <tr>
                    <td><input type="date"></td>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                    <td><input type="number" step="0.1"></td>
                    <td><input type="number"></td>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                    <td><input type="number"></td>
                    <td><input type="number"></td>
                    <td><input type="number"></td>
                    <td><input type="number" readonly style="background:#f0f0f0;"></td>
                    <td><input type="number" readonly style="background:#f0f0f0;"></td>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
