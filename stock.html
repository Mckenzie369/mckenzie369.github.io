<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Management System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; color: #333; }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { background-color: #333; color: white; text-decoration: none; padding: 10px 20px; border-radius: 5px; }
        .save-btn { background-color: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        .save-btn:hover { background-color: #45a049; }
        
        .table-responsive { overflow-x: auto; background-color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        th { background-color: #fff200; color: #000; border: 1px solid #ccc; font-size: 0.9rem; text-align: center; }
        
        th.col-status { background-color: #a8f0c6; } 
        th.col-front { background-color: #b3e5fc; } 
        th.col-back { background-color: #ffecb3; } 
        th.col-hangdong { background-color: #e1bee7; } 
        th.col-sum { background-color: #c8e6c9; } 
        th.col-diff { background-color: #bbdefb; } 

        td { border: 1px solid #ccc; padding: 0; }
        input[type="text"], input[type="number"], input[type="date"], textarea {
            width: 100%; border: none; padding: 10px 8px; box-sizing: border-box; background-color: transparent; font-family: inherit; font-size: 0.9rem;
        }
        input:focus, textarea:focus { outline: 2px solid #2196F3; outline-offset: -2px; background-color: #f0f8ff; }
        
        /* การตั้งค่าให้คอลัมน์ยืดหดได้อย่างอิสระ */
        .resize-header { resize: horizontal; overflow: auto; min-width: 60px; max-width: 500px; padding: 12px 8px; box-sizing: border-box; }
        .resize-input { resize: both; overflow: auto; min-height: 40px; }
        .code-input { resize: both; overflow: auto; min-width: 250px; min-height: 40px; font-size: 0.95rem; }
        .name-input { resize: both; min-width: 350px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="header-container">
        <h2>ระบบจัดการและตรวจนับสินค้า</h2>
        <div>
            <a href="index.html" class="back-btn">กลับหน้าหลัก</a>
            <button class="save-btn" onclick="saveToGoogleSheets()" id="saveBtn">บันทึกข้อมูล</button>
        </div>
    </div>

    <datalist id="productList"></datalist>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th><div class="resize-header">วันที่</div></th>
                    <th><div class="resize-header">รหัสสินค้า</div></th>
                    <th><div class="resize-header">ชื่อสินค้า</div></th>
                    <th class="col-status"><div class="resize-header">สถานะหมดอายุ</div></th>
                    <th><div class="resize-header">น้ำหนัก</div></th>
                    <th><div class="resize-header">บรรจุ</div></th>
                    <th><div class="resize-header">Location</div></th>
                    <th><div class="resize-header">ผู้รับผิดชอบ</div></th>
                    <th class="col-front"><div class="resize-header">หน้าร้าน</div></th>
                    <th class="col-back"><div class="resize-header">หลังบ้าน</div></th>
                    <th class="col-hangdong"><div class="resize-header">หางดง</div></th>
                    <th class="col-sum"><div class="resize-header">ผลรวม (จำนวน)</div></th>
                    <th class="col-sum"><div class="resize-header">ผลรวม (น้ำหนัก)</div></th>
                    <th class="col-diff"><div class="resize-header">ที่มาของส่วนต่าง</div></th>
                    <th><div class="resize-header">หมายเหตุ</div></th>
                </tr>
            </thead>
            <tbody id="stockTableBody">
                <tr>
                    <td colspan="15" style="padding: 20px; text-align: center;">กำลังโหลดข้อมูลจากไฟล์ CSV...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // ==========================================
        // 1. ระบบโหลดข้อมูลจาก CSV มากรอกตารางอัตโนมัติ
        // ==========================================
        async function loadCSVData() {
            try {
                // โหลดไฟล์ data.csv ที่ถูกอัปโหลดขึ้นไป
                const response = await fetch('data.csv');
                if (!response.ok) throw new Error('ไม่พบไฟล์ data.csv');
                
                const csvText = await response.text();
                const rows = parseCSV(csvText);
                
                const tbody = document.getElementById('stockTableBody');
                tbody.innerHTML = ''; 
                
                // เริ่มลูปอ่านข้อมูล (ข้ามบรรทัดแรกที่เป็นหัวตาราง)
                for (let i = 1; i < rows.length; i++) {
                    const rowData = rows[i];
                    // ข้ามบรรทัดว่าง หรือบรรทัดที่ไม่มีรหัสสินค้า
                    if (rowData.length < 2 || !rowData[1]) continue; 
                    
                    const tr = document.createElement('tr');
                    
                    // สร้างช่องกรอกข้อมูลและดึงข้อมูลมาใส่ให้ตรงคอลัมน์
                    tr.innerHTML = `
                        <td><input type="date" value="${formatDate(rowData[0])}"></td>
                        <td><input type="text" list="productList" class="code-input" onchange="autoFillName(this)" value="${rowData[1] || ''}"></td>
                        <td><textarea class="resize-input name-input">${rowData[2] || ''}</textarea></td>
                        <td><input type="text" value="${rowData[3] || ''}"></td>
                        <td><input type="number" step="0.1" value="${rowData[4] || ''}"></td>
                        <td><input type="number" value="${rowData[5] || ''}"></td>
                        <td><input type="text" value="${rowData[6] || ''}"></td>
                        <td><input type="text" value="${rowData[7] || ''}"></td>
                        <td><input type="number" value="${rowData[8] || ''}"></td>
                        <td><input type="number" value="${rowData[9] || ''}"></td>
                        <td><input type="number" value="${rowData[10] || ''}"></td>
                        <td><input type="number" readonly style="background:#f0f0f0;" value="${rowData[11] || ''}"></td>
                        <td><input type="number" readonly style="background:#f0f0f0;" value="${rowData[12] || ''}"></td>
                        <td><textarea class="resize-input">${rowData[13] || ''}</textarea></td>
                        <td><textarea class="resize-input">${rowData[14] || ''}</textarea></td>
                    `;
                    tbody.appendChild(tr);
                }
            } catch (error) {
                console.error('Error loading CSV:', error);
                document.getElementById('stockTableBody').innerHTML = '<tr><td colspan="15" style="padding: 20px; text-align: center; color: red;">ไม่พบไฟล์ data.csv กรุณาอัปโหลดไฟล์เข้าระบบ</td></tr>';
            }
        }

        // ตัวช่วยแยกคอลัมน์จากไฟล์ CSV
        function parseCSV(text) {
            const rows = []; let currentRow = []; let currentCell = ''; let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (inQuotes) {
                    if (char === '"' && text[i+1] === '"') { currentCell += '"'; i++; } 
                    else if (char === '"') { inQuotes = false; } 
                    else { currentCell += char; }
                } else {
                    if (char === '"') { inQuotes = true; } 
                    else if (char === ',') { currentRow.push(currentCell.trim()); currentCell = ''; } 
                    else if (char === '\\n' || char === '\\r') {
                        currentRow.push(currentCell.trim()); rows.push(currentRow);
                        currentRow = []; currentCell = '';
                        if (char === '\\r' && text[i+1] === '\\n') i++;
                    } else { currentCell += char; }
                }
            }
            if (currentCell) currentRow.push(currentCell.trim());
            if (currentRow.length > 0) rows.push(currentRow);
            return rows;
        }

        // แปลงรูปแบบวันที่จาก DD/MM/YYYY ให้เป็น YYYY-MM-DD เพื่อแสดงในปฏิทินของเว็บได้
        function formatDate(dateString) {
            if (!dateString) return '';
            const parts = dateString.split('/');
            if (parts.length === 3) return `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
            return dateString;
        }

        // ==========================================
        // 2. ระบบ Dropdown และ Auto-fill ชื่อสินค้า (โหลดจาก products.json)
        // ==========================================
        let productDatabase = [];
        fetch('products.json').then(res => res.json()).then(data => {
            productDatabase = data;
            const datalist = document.getElementById('productList');
            datalist.innerHTML = data.map(p => `<option value="${p.code}">${p.name}</option>`).join('');
        }).catch(err => console.error('Error loading JSON:', err));

        function autoFillName(inputElement) {
            const foundProduct = productDatabase.find(p => p.code === inputElement.value);
            if (foundProduct) {
                const nameInput = inputElement.closest('tr').querySelector('.name-input');
                if (nameInput) nameInput.value = foundProduct.name;
            }
        }

        // ==========================================
        // 3. ระบบส่งข้อมูลบันทึกลง Google Sheets
        // ==========================================
        function saveToGoogleSheets() {
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.innerText = "กำลังบันทึก..."; saveBtn.disabled = true;
            
            const rows = document.querySelectorAll('#stockTableBody tr');
            const dataToSend = [];
            rows.forEach(row => {
                const inputs = row.querySelectorAll('input, textarea');
                if(inputs.length > 1 && inputs[1].value.trim() !== '') {
                    const rowData = [];
                    inputs.forEach(input => rowData.push(input.value));
                    dataToSend.push(rowData);
                }
            });

            if(dataToSend.length === 0) {
                alert("ไม่มีข้อมูลให้บันทึก");
                saveBtn.innerText = "บันทึกข้อมูล"; saveBtn.disabled = false;
                return;
            }

            // *** อย่าลืมนำลิงก์ Web App URL จาก Google Apps Script มาใส่ตรงนี้นะครับ ***
            const GOOGLE_SCRIPT_URL = "ใส่ลิงก์_WEB_APP_URL_ของคุณที่นี่";
            
            fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(dataToSend), mode: 'no-cors', headers: {'Content-Type': 'application/json'} })
            .then(() => {
                alert('บันทึกข้อมูลลง Google Sheets เรียบร้อย!');
                saveBtn.innerText = "บันทึกข้อมูล"; saveBtn.disabled = false;
            }).catch(err => {
                alert('เกิดข้อผิดพลาดในการบันทึก'); saveBtn.innerText = "บันทึกข้อมูล"; saveBtn.disabled = false;
            });
        }

        // สั่งให้โหลดข้อมูลตารางทันทีเมื่อเปิดหน้าเว็บ
        window.addEventListener('DOMContentLoaded', loadCSVData);

    </script>
</body>
</html>
