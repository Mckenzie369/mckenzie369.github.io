<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Management System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .back-btn {
            background-color: #333;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
        }
        .save-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
        .save-btn:hover {
            background-color: #45a049;
        }
        
        /* การตั้งค่าตารางให้เลื่อนซ้ายขวาได้ */
        .table-responsive {
            overflow-x: auto;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            white-space: nowrap; /* ป้องกันไม่ให้ข้อความตกบรรทัด */
        }
        
        /* ตกแต่งหัวตาราง */
        th {
            background-color: #fff200; /* สีเหลืองตามภาพ */
            color: #000;
            border: 1px solid #ccc;
            padding: 12px 8px;
            font-size: 0.9rem;
            text-align: center;
        }
        
        /* ใส่สีพื้นหลังให้บางคอลัมน์เหมือนในภาพ */
        th.col-status { background-color: #a8f0c6; } /* สีเขียวอ่อน */
        th.col-front { background-color: #b3e5fc; } /* สีฟ้าอ่อน */
        th.col-back { background-color: #ffecb3; } /* สีส้มอ่อน */
        th.col-hangdong { background-color: #e1bee7; } /* สีม่วงอ่อน */
        th.col-sum { background-color: #c8e6c9; } /* สีเขียว */
        th.col-diff { background-color: #bbdefb; } /* สีฟ้า */

        /* ตกแต่งช่องกรอกข้อมูล */
        td {
            border: 1px solid #ccc;
            padding: 0; /* เอา padding ออกเพื่อให้ input เต็มกรอบ */
        }
        
        /* ทำให้ช่อง input เนียนไปกับตารางเหมือน Excel */
        input[type="text"], input[type="number"], input[type="date"] {
            width: 100%;
            border: none;
            padding: 10px 8px;
            box-sizing: border-box;
            background-color: transparent;
            font-family: inherit;
            font-size: 0.9rem;
        }
        
        /* เมื่อคลิกที่ช่อง ให้มีกรอบสีฟ้าโผล่ขึ้นมา */
        input:focus {
            outline: 2px solid #2196F3;
            outline-offset: -2px;
            background-color: #f0f8ff;
        }
/* 1. สร้างกล่องยืดหดได้สำหรับหัวตาราง (ปรับความกว้าง) */
        .resize-header {
            resize: horizontal; /* อนุญาตให้ลากยืดซ้าย-ขวาได้ */
            overflow: auto;     /* จำเป็นต้องมีเพื่อให้แถบ resize ทำงาน */
            min-width: 60px;    /* ขนาดกว้างขั้นต่ำป้องกันการหดจนมองไม่เห็น */
            max-width: 500px;   /* ขนาดกว้างสุด */
            padding: 8px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 2. เปลี่ยนช่องกรอกข้อมูลให้ยืดความสูงได้ (ปรับความสูง) */
        .resize-input {
            resize: vertical; /* อนุญาตให้ลากยืดบน-ล่างได้ */
            overflow: auto;
            min-height: 40px; /* ความสูงเริ่มต้น */
        }  
        /* ปรับแต่งช่องรหัสสินค้าให้ขยายได้ และมีขนาดเริ่มต้นกว้างขึ้น */
        .code-input {
            resize: both; /* อนุญาตให้ใช้เมาส์ลากขยายได้ทั้งความกว้างและความสูง */
            overflow: auto;
            min-width: 250px; /* บังคับให้ความกว้างเริ่มต้นกว้างขึ้น เพื่อให้ Dropdown แสดงข้อความได้ยาวขึ้นตั้งแต่แรก */
            min-height: 40px;
            font-size: 0.95rem; /* ปรับขนาดตัวอักษรให้ใหญ่ขึ้นเล็กน้อยเพื่อให้อ่านง่าย */
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h2>ระบบจัดการและตรวจนับสินค้า</h2>
        <div>
            <a href="index.html" class="back-btn">กลับหน้าหลัก</a>
            <button class="save-btn" onclick="alert('นี่คือปุ่มจำลองการบันทึกข้อมูลครับ')">บันทึกข้อมูล</button>
        </div>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th><div class="resize-header">วันที่</div></th>
                    <th><div class="resize-header">รหัสสินค้า</div></th>
                    <th><div class="resize-header">ชื่อสินค้า</div></th>
                    <th class="col-status">สถานะหมดอายุ</th>
                    <th><div class="resize-header">น้ำหนัก</div></th>
                    <th><div class="resize-header">บรรจุ</div></th>
                    <th><div class="resize-header">Location</div></th>
                    <th><div class="resize-header">ผู้รับผิดชอบ</div></th>
                    <th class="col-front">หน้าร้าน</th>
                    <th class="col-back">หลังบ้าน</th>
                    <th class="col-hangdong">หางดง</th>
                    <th class="col-sum">ผลรวม (จำนวน)</th>
                    <th class="col-sum">ผลรวม (น้ำหนัก)</th>
                    <th class="col-diff">ที่มาของส่วนต่าง</th>
                    <th>หมายเหตุ</th>
                </tr>
            </thead>
            <datalist id="productList"></datalist>
            <tbody id="stockTableBody">
              <tbody>
                <tr>
                    <td><textarea class="resize-input">2026-06-18</textarea></td>
                    <td><input type="text" list="productList" class="code-input" onchange="autoFillName(this)"></td>
                    <td><textarea class="resize-input name-input"></textarea></td>
                    <td><textarea class="resize-input">ปกติ</textarea></td>
                    <td><input type="number" step="0.1" value="1.5"></td>
                    <td><input type="number" value="1"></td>
                    <td><input type="text" value="PETSHOP"></td>
                    <td><input type="text" value="W"></td>
                    <td><input type="number" placeholder="0"></td>
                    <td><input type="number" placeholder="0"></td>
                    <td><input type="number" placeholder="0"></td>
                    <td><input type="number" readonly placeholder="คำนวณออโต้" style="background:#f0f0f0;"></td>
                    <td><input type="number" readonly placeholder="คำนวณออโต้" style="background:#f0f0f0;"></td>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                </tr>
                <tr>
                    <td><input type="date"></td>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                    <td><input type="number" step="0.1"></td>
                    <td><input type="number"></td>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                    <td><input type="number"></td>
                    <td><input type="number"></td>
                    <td><input type="number"></td>
                    <td><input type="number" readonly style="background:#f0f0f0;"></td>
                    <td><input type="number" readonly style="background:#f0f0f0;"></td>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                </tr>
            </tbody>
        </table>
    </div>
        <script>
// ==========================================
        // ระบบ Dropdown และ Auto-fill ชื่อสินค้า
        // ==========================================
        
        let productDatabase = []; // ตัวแปรเก็บข้อมูลสินค้าทั้งหมด

        // 1. โหลดข้อมูลจาก products.json เมื่อเปิดหน้าเว็บ
        fetch('products.json')
            .then(response => response.json())
            .then(data => {
                productDatabase = data;
                populateDatalist(productDatabase);
            })
            .catch(error => {
                console.error('ไม่สามารถโหลดข้อมูล products.json ได้:', error);
            });

        // 2. ฟังก์ชันนำข้อมูลรหัสสินค้าไปใส่ใน Dropdown (<datalist>)
        function populateDatalist(products) {
            const datalist = document.getElementById('productList');
            let options = '';
            products.forEach(product => {
                options += `<option value="${product.code}">${product.name}</option>`;
            });
            datalist.innerHTML = options;
        }

        // 3. ฟังก์ชันเติมชื่อสินค้าอัตโนมัติเมื่อเลือกรหัสผ่าน Dropdown
        function autoFillName(inputElement) {
            const selectedCode = inputElement.value;
            const foundProduct = productDatabase.find(p => p.code === selectedCode);
            
            if (foundProduct) {
                const currentRow = inputElement.closest('tr');
                const nameInput = currentRow.querySelector('.name-input');
                if (nameInput) {
                    nameInput.value = foundProduct.name;
                }
            }
        }
    </script>            
</body>

                    
</html>
